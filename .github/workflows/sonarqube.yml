name: SonarQube Analysis

on:
  pull_request:
    types: [labeled] # Спрацьовує тільки при додаванні лейбла

jobs:
  sonarqube:
    name: Code Scan
    # Запускаємо роботу ТІЛЬКИ якщо доданий лейбл має точну назву 'sonarqube'
    if: ${{ github.event.label.name == 'sonarqube' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          # This tells the action to wait for the final Quality Gate result
          # If the Quality Gate fails, the GitHub Action will fail (Red X)
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
