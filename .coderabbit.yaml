# .coderabbit.yaml
language: "en-US"
early_access: false

reviews:
  # 'chill' provides constructive feedback without being overly pedantic
  profile: "chill"
  
  # Disable these so they don't conflict with PR-Agent's summaries
  high_level_summary: false
  poem: false
  collapse_walkthrough: true
  
  # Enable line-by-line review comments
  review_status: true
  request_changes_workflow: false

  # Optional: Tell CodeRabbit to ignore files generated by SonarQube or other tools
  ignore_paths:
    - "**.min.js"
    - "**.map"
    - "coverage/**"
    - ".scannerwork/**" # Ignore SonarQube working directories if they end up in PRs

chat:
  # Allows you to tag @coderabbitai in PR comments to ask specific questions
  auto_reply: true
